<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page de demo — AutoClicker Sandbox</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --b:#334155; --txt:#e2e8f0; --mut:#94a3b8; --acc:#7c5cff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--txt); }
    header { padding:18px 24px; border-bottom:1px solid var(--b); }
    header h1 { margin:0; font-size:20px; }
    header p { margin:6px 0 0; color:var(--mut); font-size:14px; }
    main { max-width:760px; margin:0 auto; padding:24px; display:grid; gap:18px; }
    .card { background:var(--card); border:1px solid var(--b); border-radius:12px; padding:18px; }
    .card h2 { margin:0 0 12px; font-size:15px; color:var(--acc); text-transform:uppercase; letter-spacing:.5px; }
    button { cursor:pointer; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600; color:#fff; background:var(--acc); }
    button:hover { filter:brightness(1.1); }
    button.alt { background:#2563eb; }
    button.warn { background:#f59e0b; }
    .big { font-size:34px; font-weight:800; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(54px,1fr)); gap:8px; }
    .tile { aspect-ratio:1; border-radius:8px; border:1px solid var(--b); background:#0b1220; display:grid; place-items:center; cursor:pointer; font-size:13px; }
    .tile.on { background:#facc15; color:#1e293b; border-color:#ca8a04; }
    .log { font-family: ui-monospace, monospace; font-size:12px; background:#0b1220; border:1px solid var(--b); border-radius:8px; padding:10px; height:120px; overflow:auto; }
    input[type=text] { background:#0b1220; border:1px solid var(--b); color:var(--txt); border-radius:8px; padding:9px 12px; font-size:14px; width:100%; }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Page de demo — AutoClicker Sandbox</h1>
    <p>Cible d'entrainement pour tester la pipette et le curseur anime sans dependre de ton portfolio.</p>
  </header>

  <main>
    <div class="card">
      <h2>1 · Compteur</h2>
      <div class="row">
        <button id="inc">+1</button>
        <button id="dec" class="alt">-1</button>
        <button id="reset" class="warn">Reset</button>
        <span class="big" id="count">0</span>
      </div>
    </div>

    <div class="card">
      <h2>2 · Grille de tuiles (clique pour activer)</h2>
      <div class="grid" id="grid"></div>
      <p>Tuiles actives : <b id="active">0</b></p>
    </div>

    <div class="card">
      <h2>3 · Formulaire</h2>
      <input type="text" id="name" placeholder="Tape ou laisse l'autoclicker cliquer le bouton">
      <div class="row" style="margin-top:10px;">
        <button id="submit">Valider</button>
        <span id="result" style="color:var(--mut);"></span>
      </div>
    </div>

    <div class="card">
      <h2>Journal</h2>
      <div class="log" id="log"></div>
    </div>
  </main>

  <script src="demo.js"></script>
</body>
</html>
