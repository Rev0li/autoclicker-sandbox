<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <header>
      <div class="logo">🖱️</div>
      <div class="titles">
        <h1>AutoClicker Sandbox</h1>
        <p>Bac a sable de clics automatises</p>
      </div>
    </header>

    <!-- Ajout d'etape via la pipette -->
    <button id="pick" class="btn btn-primary">🎯 Ajouter une etape (pipette)</button>
    <button id="addSleep" class="btn btn-secondary btn-sleep">⏸️ Ajouter une pause (sleep)</button>
    <p class="help">
      Clique, puis selectionne un element sur la page. Le popup se ferme
      pendant la selection : rouvre-le ensuite pour voir l'etape ajoutee.
    </p>

    <!-- Liste des etapes -->
    <div id="steps" class="steps"></div>
    <p id="empty" class="empty">
      Aucune etape pour l'instant.<br>Utilise « Ajouter une etape » pour commencer.
    </p>

    <!-- Options globales -->
    <div class="options">
      <div class="opt">
        <label for="loops">Repetitions</label>
        <input id="loops" type="number" min="1" value="1">
      </div>
      <div class="opt opt-check">
        <label><input id="infinite" type="checkbox"> Boucle ∞</label>
      </div>
      <div class="opt opt-grow">
        <label>Vitesse curseur : <b id="speedval">600</b> ms</label>
        <input id="speed" type="range" min="150" max="1500" step="50" value="600">
      </div>
    </div>

    <label class="pointer-opt">
      <input id="pointer" type="checkbox">
      Mode SVG / pointer events <small>(plans de salle, canvas, drag)</small>
    </label>

    <!-- Lecture -->
    <div class="run">
      <button id="play" class="btn btn-go">▶ Lancer</button>
      <button id="stop" class="btn btn-stop">■ Stop</button>
    </div>

    <div id="status" class="status">Pret.</div>

    <!-- Outils -->
    <div class="footer">
      <button id="export" class="link">Exporter</button>
      <button id="import" class="link">Importer</button>
      <button id="clear" class="link link-danger">Tout effacer</button>
      <input id="file" type="file" accept="application/json" hidden>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
